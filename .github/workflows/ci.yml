name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted (run gofmt -w .):"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Test
        run: go test -count=1 ./...
      - name: Build
        run: go build ./cmd/nodin

  # Integration tests run only on PRs (not on pushes to main, since the same
  # tests will already have run on the PR before it was merged).
  #
  # Fork PRs do not have access to repository secrets — that's a GitHub security
  # feature, not an oversight. When the secret is missing the steps skip
  # gracefully, so fork PRs still get a green CI run for the unit tests.
  # Maintainer should pull external contributions into a branch in this repo
  # to exercise the integration suite before merging.
  integration:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    env:
      NODIN_TEST_TOKEN: ${{ secrets.NODIN_TEST_TOKEN }}
      NODIN_TEST_PAGE_ID: ${{ secrets.NODIN_TEST_PAGE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Integration tests
        if: ${{ env.NODIN_TEST_TOKEN != '' }}
        run: go test -tags integration -timeout 300s -v ./internal/sync/ ./internal/notion/
      - name: E2E tests
        if: ${{ env.NODIN_TEST_TOKEN != '' }}
        run: go test -tags e2e -timeout 600s -v ./e2e/
      - name: Fork PR — integration skipped
        if: ${{ env.NODIN_TEST_TOKEN == '' }}
        run: echo "Repository secrets not available (likely a fork PR). Integration and e2e tests skipped; maintainer will run them after pulling the changes into a branch in this repo."
