name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -count=1 ./...
      - name: Build
        run: go build ./cmd/nodin
